name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/assets/*.js
          test -f dist/assets/*.css
          echo "Build output OK"
